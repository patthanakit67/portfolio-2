<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Kanit,sans-serif;
}

body{
background:linear-gradient(135deg,#38bdf8,#3b82f6,#7c3aed);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.box{
background:white;
width:90%;
max-width:900px;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

/* รูปหน้าปก */
.banner img{
width:100%;
height:300px;
object-fit:cover;
display:block;
}

/* เนื้อหา */
.content{
padding:30px;
text-align:center;
}

/* รูปโปรไฟล์ */
.profile{
width:180px;
height:180px;
border-radius:50%;
border:6px solid white;
object-fit:cover;
margin-top:-120px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
background:white;
}

h1{
color:#2563eb;
font-size:42px;
margin-top:20px;
}

h2{
color:#7c3aed;
margin:10px 0;
}

p{
font-size:18px;
margin-bottom:30px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.menu a{
text-decoration:none;
background:linear-gradient(90deg,#38bdf8,#2563eb,#7c3aed);
color:white;
padding:15px;
border-radius:15px;
font-size:18px;
font-weight:bold;
transition:.3s;
}

.menu a:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

footer{
margin-top:30px;
color:#666;
}

</style>

</head>
